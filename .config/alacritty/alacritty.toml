[window]
startup_mode = "Maximized"

[window.padding]
x = 10
y = 10

[window.class]
instance = "Alacritty"
general = "Alacritty"

[scrolling]
history = 10000
multiplier = 3

[selection]
save_to_clipboard = false

[shell]
program = "/usr/bin/zsh"

[keyboard]
bindings = [
    { key = "Return", mods = "Alt|Control", action = "SpawnNewInstance" },
]

[font]
size = 16

[font.normal]
family = "JetBrainsMonoNL Nerd Font"
style = "Regular"

[font.bold]
family = "JetBrainsMonoNL Nerd Font"
style = "Bold"

[font.italic]
family = "JetBrainsMonoNL Nerd Font"
style = "Italic"

[font.bold_italic]
family = "JetBrainsMonoNL Nerd Font"
style = "Bold Italic"

[colors]
indexed_colors = []
draw_bold_text_with_bright_colors = true

[colors.bright]
black = "#52606B"
red = "#E44754"
green = "#89BD82"
yellow = "#F7BD51"
blue = "#5486C0"
magenta = "#B77EB8"
cyan = "#50A5A4"
white = "#FFFFFF"

[colors.cursor]
text = "CellBackground"
cursor = "CellForeground"

[colors.dim]
black = "#131415"
blue = "#556a7d"
cyan = "#5b7d78"
green = "#777c44"
magenta = "#75617b"
red = "#864343"
white = "#828482"
yellow = "#9e824c"

[colors.footer_bar]
background = "#282a36"
foreground = "#f8f8f2"

[colors.hints.end]
foreground = "#f1fa8c"
background = "#282a36"

[colors.hints.start]
foreground = "#282a36"
background = "#f1fa8c"

[colors.line_indicator]
foreground = "None"
background = "None"

[colors.normal]
black = "#121C21"
red = "#E44754"
green = "#89BD82"
yellow = "#F7BD51"
blue = "#5486C0"
magenta = "#B77EB8"
cyan = "#50A5A4"
white = "#FFFFFF"

[colors.primary]
background = "#121B21"
foreground = "#B3B8C3"
bright_foreground = "#ffffff"

[colors.search.focused_match]
foreground = "#44475a"
background = "#ffb86c"

[colors.search.matches]
foreground = "#44475a"
background = "#50fa7b"

[colors.selection]
text = "CellForeground"
background = "#44475a"

[colors.vi_mode_cursor]
text = "CellBackground"
cursor = "CellForeground"
