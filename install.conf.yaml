- defaults:
    link:
      relink: true

- clean: ['~']

- link:
    ~/.bashrc: bashrc
    ~/.zshrc: zshrc
    ~/.zprofile: zprofile
    ~/.fzf.bash: fzf.bash
    ~/.fzf.zsh: fzf.zsh
    ~/.p10k.zsh: p10k.zsh
    ~/.spacemacs: spacemacs_init
    ~/.KayFreyerDefault.json: KayFreyerDefault.json
    ~/.oh-my-zsh: ohmyzsh
    ~/.emacs.d: spacemacs
    ~/.ideavimrc: ideavimrc

- shell:
  - [git submodule update --init --recursive, Installing submodules]

